services:
  mongodb:
    image: mongo:7
    container_name: car-rental-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - car-rental-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: car-rental-backend
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - car-rental-network

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: car-rental-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - car-rental-network

volumes:
  mongodb_data:

networks:
  car-rental-network:
    driver: bridge